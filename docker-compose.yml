version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: egit
      POSTGRES_PASSWORD: password
      POSTGRES_DB: egit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egit"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://egit:password@db:5432/egit
      REPO_BASE_PATH: /data/repos
      SESSION_SECRET: change-me-in-production
      RUST_LOG: egit=debug,info
      LEPTOS_OUTPUT_NAME: egit
      LEPTOS_SITE_ADDR: "0.0.0.0:3000"
      LEPTOS_SITE_ROOT: site
    ports:
      - "3000:3000"
    volumes:
      - repo_data:/data/repos

volumes:
  postgres_data:
  repo_data:
